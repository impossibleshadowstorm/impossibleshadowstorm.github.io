            padding: 0;

            width: 80vw;

            right: 0;
            left: 0;

            width: 50vw;
            height: 80vh;
            color: white;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 35px;
        }

        .written-container .intro {
            position: absolute;
            top: 8vw;
        }

        .written-container .greet {
            font-size: 15px;
            font-weight: 100;
            letter-spacing: 0.9px;
            text-align: center;
        }

        .written-container .float-menu {
            position: absolute;
            width: 40px;
            height: 40px;
            top: 10px;
            color: #fff;
            filter: invert(100%);
            right: 10px;
            cursor: pointer;
        }

        .written-container h1 {
            background: #CA4246;
            background-color: #CA4246;
            background: conic-gradient(#CA4246 16.666%,

                    #A7489B 83.333%);

            background-repeat: repeat;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-info {
            width: 40vw;
            position: absolute;
            bottom: 20px;
            height: 30vh;
            display: flex;
        }

        .project-info .row {
            margin: 10px 0;
            width: 50%;
        }

        .project-info .row .border {
            border-top: 0.5px solid rgba(255, 255, 255, 0.315);
        }

        .project-info .row .info {
            height: 50%;
            display: flex;
            align-items: center;
        }

        .project-info .row .info .number {
            width: 30%;
            height: 100%;
            display: flex;
            align-items: center;
            align-content: center;
            font-size: 50px;
        }

        .project-info .row .info .explaination {

            font-size: 25px;
            height: 100%;
            display: flex;

    <div class="main-container">
        <div class="overlay"></div>
    </div>
    <div class="small-container wrapper">
        <div class="blob-image item">
            <img src="sumi.jpg" alt="Author Image">
        </div>
        <div class="written-container">
            
            <div class="intro">
                <div class="greet" style="font-size: 13px;">Hey, this is</div>
                <h1>Sumit Saurav</h1>
                <div class="greet" style="padding-top: 20px; font-style: italic;">" A Flutter & RPA Dev Enthusiast "
                </div>
            </div>
            <div class="project-info">
                <div class="row">
                    <div class="info">
                        <div class="number">
                            <span>08</span>
                        </div>
                        <div class="explaination">
                            Projects
                        </div>
                    </div>
                    <div class="info border">
                        <div class="number">
                            <span>04</span>
                        </div>
                        <div class="explaination">
                            Months Experience
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="info">
                        <div class="number">
                            <span>01</span>
                        </div>
                        <div class="explaination">
                            National Gold Medal
                        </div>
                    </div>
                    <div class="info border">
                        <div class="number">
                            <span>10</span>
                        </div>
                        <div class="explaination">
                            Projects
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
